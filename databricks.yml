bundle:
  name: agentic-data-modeling-studio
  databricks_cli_version: ">=0.239.0"

include:
  - resources/*.yml

variables:
  resource_prefix:
    description: Prefix applied to deployed resource names.
    default: agentic-data-modeler
  work_package_id:
    description: Optional work package identifier for tracking and governance.
    default: ""
  production_root_path:
    description: Protected workspace path owned by the production deployer.
    default: /Workspace/Applications/agentic-data-modeling-studio

sync:
  include:
    - src/**
    - config/profiling_policies/**
    - contracts/**
    - prompts/**
    - skills/**
    - evals/**
    - knowledge/**
    - metadata/**
  exclude:
    - tests/**
    - docs/**

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: ${var.production_root_path}/${bundle.target}
