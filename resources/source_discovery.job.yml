resources:
  jobs:
    source_discovery:
      name: ${var.resource_prefix}-source-discovery
      description: >-
        Run-rooted source onboarding followed by governed context assembly and
        LLM-driven relationship analysis for one bounded LOB/domain slice.
      max_concurrent_runs: 1
      parameters:
        - name: work_package_id
          default: ${var.work_package_id}
      tasks:
        - task_key: validate_scope
          notebook_task:
            notebook_path: ../src/workflows/validate_source_discovery_scope.py
            source: WORKSPACE
            base_parameters:
              run_id: validate_scope_{{job.run_id}}
        - task_key: discover_source_scope
          depends_on:
            - task_key: validate_scope
          notebook_task:
            notebook_path: ../src/workflows/discover_source_scope.py
            source: WORKSPACE
            base_parameters:
              run_id: discover_source_scope_{{job.run_id}}
        - task_key: register_solution_run
          depends_on:
            - task_key: discover_source_scope
          notebook_task:
            notebook_path: ../src/workflows/register_solution_run.py
            source: WORKSPACE
            base_parameters:
              run_id: register_solution_run_{{job.run_id}}
              source_tables: "{{tasks.discover_source_scope.values.source_tables}}"
              work_package_id: "{{job.parameters.work_package_id}}"
        - task_key: snapshot_source_metadata
          depends_on:
            - task_key: register_solution_run
          notebook_task:
            notebook_path: ../src/workflows/snapshot_source_metadata.py
            source: WORKSPACE
            base_parameters:
              run_id: snapshot_source_metadata_{{job.run_id}}
              source_tables: "{{tasks.discover_source_scope.values.source_tables}}"
        - task_key: profile_source
          depends_on:
            - task_key: snapshot_source_metadata
          timeout_seconds: 900
          environment_key: dqx
          notebook_task:
            notebook_path: ../src/workflows/profile_source.py
            source: WORKSPACE
            base_parameters:
              run_id: profile_source_{{job.run_id}}
              source_tables: "{{tasks.discover_source_scope.values.source_tables}}"
              source_snapshot_id: "{{tasks.snapshot_source_metadata.values.source_snapshot_id}}"
        - task_key: assemble_source_evidence
          depends_on:
            - task_key: profile_source
          notebook_task:
            notebook_path: ../src/workflows/assemble_source_evidence.py
            source: WORKSPACE
            base_parameters:
              run_id: assemble_source_evidence_{{job.run_id}}
              source_tables: "{{tasks.discover_source_scope.values.source_tables}}"
              source_snapshot_id: "{{tasks.snapshot_source_metadata.values.source_snapshot_id}}"
        - task_key: assemble_context
          depends_on:
            - task_key: assemble_source_evidence
          notebook_task:
            notebook_path: ../src/workflows/assemble_context.py
            source: WORKSPACE
            base_parameters:
              run_id: assemble_context_{{job.run_id}}
        - task_key: analyze_source_relationships
          depends_on:
            - task_key: assemble_context
          environment_key: agent
          notebook_task:
            notebook_path: ../src/workflows/analyze_source_relationships.py
            source: WORKSPACE
            base_parameters:
              run_id: analyze_source_relationships_{{job.run_id}}
              context_snapshot_id: "{{tasks.assemble_context.values.context_snapshot_id}}"
              source_snapshot_id: "{{tasks.assemble_context.values.source_snapshot_id}}"
              evidence_set_id: "{{tasks.assemble_context.values.evidence_set_id}}"
      environments:
        - environment_key: dqx
          spec:
            environment_version: "2"
            dependencies:
              - databricks-labs-dqx==0.15.0
        - environment_key: agent
          spec:
            environment_version: "2"
            dependencies:
              - databricks-sdk>=0.20,<1
              - jsonschema>=4.23,<5
              - pyyaml>=6,<7
      tags:
        solution: agentic-data-modeling-studio
        artifact_scope: source-data-dictionary
        execution_boundary: source-discovery
