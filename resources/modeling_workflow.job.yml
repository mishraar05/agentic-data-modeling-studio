resources:
  jobs:
    modeling_workflow:
      name: ${var.resource_prefix}-modeling-workflow
      description: >-
        Governed entry point for one LOB/domain modeling slice. The initial
        scaffold validates scope only; modeling tasks are added after their
        artifact contracts and acceptance gates are approved.
      max_concurrent_runs: 1
      tasks:
        - task_key: validate_scope
          notebook_task:
            notebook_path: ../src/workflows/00_validate_scope.py
            source: WORKSPACE
            base_parameters:
              run_id: modeling_job_{{job.run_id}}
              engagement_id: ${var.engagement_id}
              lob: ${var.lob}
              domain: ${var.domain}
              source_catalog: ${var.source_catalog}
              source_schema: ${var.source_schema}
              source_tables: ${var.source_tables}
              output_catalog: ${var.output_catalog}
              output_schema: ${var.output_schema}
      tags:
        solution: agentic-data-modeling-studio
        artifact_scope: modeling-and-sttm
