schema_version: "1.0"
module_id: insurance_core_billing
module_version: "0.6.0"
layer: insurance_core
approval_state: APPROVED
runtime_eligible: true
owner: TBD_BILLING_STEWARD
scope: {domains: [billing], lobs: [cross_lob, personal_auto]}
non_scope: [carrier_collection_workflow, general_ledger_design, statutory_accounting_policy, payment_card_data]
content:
  identity_and_grain:
    - {record: billing_account, grain: one source-defined account for billed obligations and receipts, warning: may_cover_multiple_policies_or_payers}
    - {record: invoice, grain: one bill issued for an account statement cycle or transaction}
    - {record: installment, grain: one scheduled amount due date and status under a payment plan}
    - {record: charge_or_credit, grain: one billed financial component with reason policy link and accounting context}
    - {record: receivable_snapshot, grain: one account or policy receivable class valuation date and currency}
    - {record: payment_receipt, grain: one received payment instrument event before allocation}
    - {record: payment_allocation, grain: one receipt allocation to one obligation or unapplied balance}
    - {record: refund, grain: one issued refund event linked to source credit or overpayment}
    - {record: writeoff_or_adjustment, grain: one authorized receivable adjustment event with reason}
    - {record: commission, grain: one producer agreement policy or premium basis earning period and transaction}
  premium_and_cash_bases:
    - {basis: quoted_premium, meaning: priced proposal amount, warning: not_written_billed_or_earned}
    - {basis: written_premium, meaning: premium generated by policies written in the reporting period under the approved accounting definition}
    - {basis: earned_premium, meaning: portion allocated to elapsed coverage under the approved earning method}
    - {basis: unearned_premium, meaning: premium associated with coverage not yet provided under the approved accounting definition}
    - {basis: billed_amount, meaning: amount presented as due on an invoice or installment}
    - {basis: receivable_amount, meaning: amount owed at a valuation point under the billing system basis}
    - {basis: cash_received, meaning: payment received before or after allocation}
    - {basis: allocated_cash, meaning: received payment applied to a specified obligation}
    - {basis: refunded_amount, meaning: cash or credit returned to a payer or payee}
    - {basis: commission_amount, meaning: producer compensation under an evidenced agreement and premium basis}
  timelines: [coverage_effective_time, policy_transaction_time, invoice_date, due_date, receipt_date, allocation_date, accounting_post_date, valuation_date, source_capture_time]
  event_types: [invoice_issued, installment_due, charge_posted, credit_posted, payment_received, payment_allocated, payment_reversed, refund_issued, writeoff_posted, delinquency_observed, commission_accrued, commission_paid, commission_reversed]
  reconciliation_contracts:
    - {contract: receipt_allocation, intent: payment_receipt_amount_reconciles_to_allocations_plus_unapplied_or_refunded_amounts, prerequisites: [currency_basis, reversal_handling, cutoff_time]}
    - {contract: invoice_balance, intent: invoice_charges_credits_allocations_adjustments_and_refunds_reconcile_to_balance, prerequisites: [sign_convention, status_behavior, valuation_time]}
    - {contract: policy_billing_premium, intent: policy_premium_components_reconcile_to_billing_charges_or_documented_timing_and_scope_differences, prerequisites: [policy_version_link, transaction_basis, fee_and_tax_treatment]}
    - {contract: commission, intent: commission_transactions_reconcile_to_evidenced premium basis agreement and reversals, prerequisites: [producer_role, agreement_version, earning_basis]}
  ambiguity_checks:
    - Account policy payer insured and payee identities are not interchangeable.
    - Installment schedule amount invoice amount receivable and collected cash are different measures.
    - Nonpayment cancellation status cannot be inferred only from an overdue invoice without policy evidence.
    - Fees taxes commissions and premium require separate components and basis.
  modeling_implications:
    silver: Preserve billing events allocations balances and policy links at native grains with accounting and business timestamps.
    gold: Separate premium transaction billing receipt receivable snapshot and commission facts.
    sttm: Require sign currency cutoff allocation reversal fee tax and policy-version derivations for financial mappings.
source_references: [naic_glossary, ca_doi_auto_guide, ca_doi_auto_terms, ca_doi_broker_disclosure]
legacy_source_assets: [knowledge/archive/pre_canonical_v0.1.0_v0.2.0/domain/pnc_policy_claims_party_product_candidate_v0.2.0.yml]
dependencies: [insurance_core_party, insurance_core_policy]
review_requirements: [billing_sme, finance_sme, policy_sme]
