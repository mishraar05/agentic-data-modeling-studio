scoring_method:
  method: weighted_coverage
  formula: sum(dimension_weight_percent * coverage_percent) / 100
  rounding: nearest_whole_percent
  maturity_bands:
    SKELETON: "0-19"
    SEED: "20-39"
    PARTIAL: "40-59"
    PILOT_CANDIDATE: "60-79"
    BROAD: "80-94"
    SCOPE_COMPLETE: "95-100"
  rules:
    - dimensions_must_total_100_percent_weight
    - zero_is_valid_when_a_required_category_is_absent
    - unapproved_content_may_increase_coverage_but_not_runtime_readiness
    - correctness_and_completeness_are_reported_separately
    - a_score_must_link_to_observed_assets_and_explicit_gaps

